name: MONTRA
options:
  bundleIdPrefix: com.elitehomefitness
  deploymentTarget:
    iOS: "17.0"
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
targets:
  MONTRA:
    type: application
    platform: iOS
    sources:
      - path: MONTRA
        excludes:
          - .git/**
    resources:
      - MONTRA/Assets.xcassets
      - MONTRA/GoogleService-Info.plist
    info:
      path: MONTRA/Info.plist
      properties:
        CFBundleDisplayName: MONTRA
        UILaunchScreen:
          UIColorName: MontraLaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elitehomefitness.montra
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES:
          - AppIconDark
          - AppIconLight
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: X29HP9D526
