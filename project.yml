name: MONTRA
options:
  bundleIdPrefix: com.montra
  deploymentTarget:
    iOS: "17.0"
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
targets:
  MONTRA:
    type: application
    platform: iOS
    sources:
      - MONTRA
    resources:
      - MONTRA/Assets.xcassets
    info:
      path: MONTRA/Info.plist
      properties:
        CFBundleDisplayName: MONTRA
        UILaunchScreen:
          UIColorName: MontraLaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.montra.app
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
